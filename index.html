<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>
        <div class="input-section">
            <input type="text" id="todo-title" placeholder="제목">
            <textarea id="todo-details" placeholder="상세내용"></textarea>
            <button id="save-button">저장</button>
        </div>
        <ul id="todo-list">
            <!-- Todo 목록이 여기에 표시됩니다 -->
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
